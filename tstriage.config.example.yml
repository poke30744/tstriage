# tstriage.config.example.yml
#
# Copy to tstriage.config.yml and adjust paths.

# CLI command paths (optional — defaults to tscutter/tsmarker on PATH)
# For local development with uncommitted source:
#Cli:
#  tscutter: uv run --directory C:/repos/tscutter tscutter
#  tsmarker: uv run --directory C:/repos/tsmarker tsmarker

# Input / output paths ($VAR and ~ supported)
Uncategoried: /path/to/recorded
Destination: /path/to/categorized

# EPGStation URL
EPGStation: http://localhost:8888

# Encoder: h264_nvenc or libx264
Encoder: h264_nvenc

# Encode presets
Presets:
  drama:
    videoFilter: bwdif=0
    crf: 24
  drama720p:
    videoFilter: bwdif=0,scale=1280:720
    crf: 24
  anime:
    videoFilter: pullup,fps=24000/1001
    crf: 24
  anime720p:
    videoFilter: pullup,fps=24000/1001,scale=1280:720
    crf: 24
  anime480p:
    videoFilter: pullup,fps=24000/1001,scale=852:480
    crf: 24

# Environment variables injected before task execution
Environment:
  OPENAI_API_KEY: sk-your-key-here
  OPENAI_API_BASE: https://api.deepseek.com
  OPENAI_MODEL: deepseek-v4-flash
